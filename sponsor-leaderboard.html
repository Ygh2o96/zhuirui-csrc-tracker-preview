<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>保荐人龙虎榜 | 追瑞</title>
    <meta
      name="description"
      content="追瑞保荐人龙虎榜基于公开 HKEX / CSRC 样本，按项目数量、阶段、A+H、市值和六号牌容量等维度观察香港 IPO 保荐机构市场节奏。"
    />
    <meta name="theme-color" content="#f3f5f1" />
    <link rel="icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="sponsor_leaderboard_demo.css?v=20260703-live-3" />
  </head>
  <body>
    <header class="site-nav" aria-label="YingSight navigation">
      <div class="site-nav-inner">
        <a class="site-brand" href="index.html" aria-label="返回追瑞监管节奏追踪">
          <span class="site-brand-mark" aria-hidden="true">追</span>
          <span><strong>追瑞</strong><small>AI-native banker hub</small></span>
        </a>
        <nav class="site-nav-links" aria-label="Primary sections">
          <a href="index.html">监管节奏追踪</a>
          <a href="index.html?view=pipeline">数据管线</a>
          <a class="is-active" href="sponsor-leaderboard.html" aria-current="page">保荐龙虎榜</a>
          <a href="index.html?view=precedents">案例检索</a>
        </nav>
      </div>
    </header>

    <main class="league-shell">
      <header class="league-header">
        <div>
          <p class="eyebrow">追瑞 · Sponsor intelligence</p>
          <h1>保荐人龙虎榜 <span>Public beta</span></h1>
          <p class="coverage" id="coverageText">正在载入…</p>
        </div>
        <div class="header-panel">
          <strong id="firmCount">--</strong>
          <span>个保荐/合并口径</span>
          <small id="generatedAt">--</small>
        </div>
      </header>

      <section class="notice-strip" id="demoNote"></section>

      <section class="metric-strip" id="metricStrip" aria-label="Sponsor summary"></section>

      <section class="controls" aria-label="Sponsor leaderboard filters">
        <div class="search-field">
          <span aria-hidden="true">搜</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="搜索保荐人、项目、行业…" />
        </div>
        <div class="preset-row" id="presetRow">
          <button type="button" class="preset is-active" data-preset="all">全部</button>
          <button type="button" class="preset" data-preset="applying">申请中</button>
          <button type="button" class="preset" data-preset="listed">已上市</button>
          <button type="button" class="preset" data-preset="ah">A+H</button>
          <button type="button" class="preset" data-preset="recentA1">近30天新交表</button>
          <button type="button" class="preset" data-preset="recentNotice">近90天备案通过</button>
        </div>
        <div class="filter-grid">
          <label>
            <span>排名口径</span>
            <select id="metricSelect">
              <option value="projectCount">项目数</option>
              <option value="activeCount">申请中项目</option>
              <option value="listedCount">已上市项目</option>
              <option value="ahCount">A+H 项目</option>
              <option value="listingMarketCapHkdBnSum">上市日港股市值</option>
              <option value="aShareMarketCapRmbBnSum">A股市值</option>
              <option value="lifecycleMedianDays">A1→上市中位数（已上市）</option>
              <option value="type6TotalCount">六号牌人数</option>
              <option value="type6RepPerProject">Rep/项目</option>
              <option value="projectsPerType6Rep">项目/六号牌Rep</option>
              <option value="projectsPerType6RO">项目/RO</option>
              <option value="projectsPerType6Total">项目/六号牌总人数</option>
            </select>
          </label>
          <label>
            <span>信用口径</span>
            <select id="creditSelect">
              <option value="creditAllFull">全额计入</option>
              <option value="creditEqual">平均拆分</option>
              <option value="creditFirstNamed">首名计入</option>
            </select>
          </label>
          <label>
            <span>阶段</span>
            <select id="stageSelect">
              <option value="all">全部阶段</option>
              <option value="applying">上市申请中</option>
              <option value="listed">已上市</option>
              <option value="other">搁置/撤回</option>
            </select>
          </label>
          <label>
            <span>类型</span>
            <select id="typeSelect">
              <option value="all">全部类型</option>
            </select>
          </label>
          <label>
            <span>性质</span>
            <select id="natureSelect">
              <option value="all">全部性质</option>
            </select>
          </label>
          <label>
            <span>日期字段</span>
            <select id="dateFieldSelect">
              <option value="a1Date">A1</option>
              <option value="noticeDate">备案通知书</option>
              <option value="listingDate">上市日</option>
            </select>
          </label>
          <label>
            <span>起始</span>
            <input id="dateFrom" type="date" autocomplete="off" />
          </label>
          <label>
            <span>截至</span>
            <input id="dateTo" type="date" autocomplete="off" />
          </label>
        </div>
      </section>

      <section class="league-board">
        <div class="board-title">
          <div>
            <h2>排行榜</h2>
            <p id="resultHint">--</p>
          </div>
          <button id="clearButton" type="button">清除筛选</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>排名</th>
                <th>保荐人</th>
                <th>性质</th>
                <th>六号牌</th>
                <th>项目</th>
                <th>申请中</th>
                <th>已上市</th>
                <th>A+H</th>
                <th id="primaryMetricHead">排名指标</th>
                <th id="marketCapHead">市值</th>
                <th title="已上市项目显示 A1→上市最终周期；申请中项目显示截至快照日已过天数">周期 / 已过</th>
                <th>行业</th>
              </tr>
            </thead>
            <tbody id="leaderboardRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <button class="drawer-backdrop" id="drawerBackdrop" type="button" aria-label="关闭"></button>
      <section class="drawer-panel" role="dialog" aria-modal="true" aria-label="Sponsor detail">
        <button class="drawer-close" id="drawerClose" type="button">关闭</button>
        <div id="drawerContent"></div>
      </section>
    </aside>

    <script src="sponsor_leaderboard_demo.js?v=20260703-live-2"></script>
  </body>
</html>
