name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          set -euo pipefail
          mkdir -p _site/assets/pipeline _site/data
          cp index.html sponsor-leaderboard.html app.js styles.css sponsor_leaderboard_demo.css sponsor_leaderboard_demo.js CNAME .nojekyll _site/
          cp assets/favicon.svg _site/assets/
          cp assets/pipeline/*.png _site/assets/pipeline/
          cp data/csrc_tracker_public.json _site/data/
          cp data/sponsor_leaderboard_demo.json _site/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
